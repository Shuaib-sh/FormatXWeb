<div class="spotlight-wrapper">

  <!-- Search Bar -->
  <div class="spotlight-bar" [class.spotlight-bar--open]="isOpen" (click)="open()">
    <svg class="spotlight-search-icon" xmlns="http://www.w3.org/2000/svg"
      width="18" height="18" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>

    <input
      class="spotlight-input"
      type="text"
      [(ngModel)]="query"
      (ngModelChange)="onQueryChange()"
      (focus)="isOpen = true"
      (keydown)="onKeyDown($event)"
      placeholder="Search tools, converters, formatters..."
    />

    <kbd class="spotlight-shortcut" *ngIf="!isOpen">/</kbd>

    <button class="spotlight-clear" *ngIf="isOpen && query" (click)="clearQuery($event)">
      Clear
    </button>
  </div>

  <!-- Dropdown Panel -->
  <div class="spotlight-dropdown" *ngIf="isOpen">

    <!-- SEARCH RESULTS -->
    <div class="spotlight-scroll" *ngIf="isSearching">
      <div *ngIf="filteredResults.length === 0" class="spotlight-empty">
        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <p>No tools found for "{{ query }}"</p>
        <span>Try a different search term</span>
      </div>

      <ng-container *ngFor="let group of filteredResults; let gi = index">
        <div class="spotlight-group-label">{{ group.groupName }}</div>
        <button
          *ngFor="let tool of group.tools; let ti = index"
          class="spotlight-tool-row"
          [class.spotlight-tool-row--active]="activeIndex === getFlatIndex(gi, ti)"
          (click)="selectTool(tool)"
          (mouseenter)="activeIndex = getFlatIndex(gi, ti)">
          <span class="spotlight-tool-icon">{{ getIconEmoji(tool.iconName) }}</span>
          <div class="spotlight-tool-info">
            <span class="spotlight-tool-name" [innerHTML]="highlightMatch(tool.name)"></span>
            <span class="spotlight-tool-desc" [innerHTML]="highlightMatch(tool.description)"></span>
          </div>
          <svg class="spotlight-chevron" xmlns="http://www.w3.org/2000/svg"
            width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
      </ng-container>
    </div>

    <!-- GROUP LIST VIEW -->
    <div class="spotlight-scroll" *ngIf="!isSearching && !selectedGroup">
      <div class="spotlight-group-label spotlight-group-label--header">
        ✦ Browse by category
      </div>
      <button
        *ngFor="let group of toolGroups; let i = index"
        class="spotlight-group-row"
        [class.spotlight-group-row--active]="activeIndex === i"
        (click)="selectGroup(group)"
        (mouseenter)="activeIndex = i">
        <span class="spotlight-group-icon-box">{{ getIconEmoji(group.tools[0].iconName) }}</span>
        <div class="spotlight-tool-info">
          <span class="spotlight-tool-name">{{ group.groupName }}</span>
          <span class="spotlight-tool-desc">{{ group.tools.length }} tool{{ group.tools.length !== 1 ? 's' : '' }}</span>
        </div>
        <svg class="spotlight-chevron" xmlns="http://www.w3.org/2000/svg"
          width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>

    <!-- SELECTED GROUP TOOLS VIEW -->
    <div class="spotlight-scroll"
      *ngIf="!isSearching && selectedGroup"
      [class.slide-in]="slideDirection === 'in'"
      [class.slide-out]="slideDirection === 'out'">

      <button class="spotlight-back-btn" (click)="goBack()">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Back to categories
      </button>

      <div class="spotlight-group-label">{{ selectedGroup.groupName }}</div>

      <button
        *ngFor="let tool of selectedGroup.tools; let i = index"
        class="spotlight-tool-row"
        [class.spotlight-tool-row--active]="activeIndex === i"
        (click)="selectTool(tool)"
        (mouseenter)="activeIndex = i">
        <span class="spotlight-tool-icon">{{ getIconEmoji(tool.iconName) }}</span>
        <div class="spotlight-tool-info">
          <span class="spotlight-tool-name">{{ tool.name }}</span>
          <span class="spotlight-tool-desc">{{ tool.description }}</span>
        </div>
        <svg class="spotlight-chevron" xmlns="http://www.w3.org/2000/svg"
          width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>

    <!-- Footer -->
    <div class="spotlight-footer">
      <span><kbd>↑↓</kbd> navigate</span>
      <span><kbd>↵</kbd> select</span>
      <span><kbd>esc</kbd> close</span>
    </div>
  </div>

</div>
