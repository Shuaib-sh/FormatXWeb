<div class="email-modal-overlay" (click)="onOverlayClick($event)">
  <div class="email-modal">

    <!-- Header -->
    <div class="email-modal-header">
      <div class="email-modal-header-left">
        <div class="email-modal-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"></rect>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
          </svg>
        </div>
        <div>
          <h2 class="email-modal-title">Send via Email</h2>
          <p class="email-modal-subtitle">Share your <strong>{{ data.toolName }}</strong> output</p>
        </div>
      </div>
      <button class="email-modal-close" (click)="onClose()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="email-modal-body">

      <!-- From -->
      <div class="email-field">
        <label class="email-label">From</label>
        <div class="email-input-readonly">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <span>{{ fromEmail }}</span>
        </div>
      </div>

      <!-- To -->
      <div class="email-field">
        <label class="email-label">To</label>
        <input
          class="email-input"
          [class.email-input--error]="toError"
          type="email"
          [(ngModel)]="toEmail"
          (blur)="onToBlur()"
          placeholder="Add recipient..."
          autocomplete="off"
        />
        <span class="email-field-error" *ngIf="toError">{{ toError }}</span>
      </div>

      <!-- Subject -->
      <div class="email-field">
        <label class="email-label">Subject</label>
        <input
          class="email-input"
          type="text"
          [(ngModel)]="subject"
          placeholder="Subject"
        />
      </div>

      <!-- Personal Message -->
      <textarea
        class="email-message"
        [(ngModel)]="personalMessage"
        placeholder="Add a personal message (optional)...">
      </textarea>

      <!-- Output Preview -->
      <div class="email-output-card">
        <div class="email-output-card-header">
          <div class="email-output-card-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2">
              <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
            </svg>
          </div>
          <div>
            <p class="email-output-card-title">Processed Output</p>
            <p class="email-output-card-meta">
              {{ characterCount }} characters &bull;
              <span class="email-output-included">Included</span>
            </p>
          </div>
        </div>
        <pre class="email-output-preview">{{ outputPreview }}<span *ngIf="data.outputContent.length > 300">...</span></pre>
      </div>

    </div>

    <!-- Footer -->
    <div class="email-modal-footer">
      <span class="email-footer-hint" *ngIf="!canSend() && !toEmail">
        Add at least one recipient to send
      </span>
      <span class="email-footer-hint email-footer-hint--error" *ngIf="toError">
        Fix the errors above to continue
      </span>
      <div class="email-footer-actions">
        <button class="email-btn-cancel" (click)="onClose()">Cancel</button>
        <button
          class="email-btn-send"
          [disabled]="!canSend()"
          (click)="onSend()">
          <span *ngIf="!isSending">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
            Send Email
          </span>
          <span *ngIf="isSending" class="email-sending-spinner">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" class="spin">
              <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
            </svg>
            Sending...
          </span>
        </button>
      </div>
    </div>

  </div>
</div>
